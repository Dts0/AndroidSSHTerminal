name: Android CI

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
      - 'fix/**'
  pull_request:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null || true

      - name: Install Android SDK / NDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Verify Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Run lint
        run: ./gradlew lint --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload app APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sshtool-apks-${{ github.run_number }}
          if-no-files-found: error
          path: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            app/build/reports/lint-results-*.html
            termux-terminal-emulator/build/reports/lint-results-*.html
            termux-terminal-view/build/reports/lint-results-*.html

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          if-no-files-found: warn
          path: |
            app/build/reports/tests/**
            termux-terminal-emulator/build/reports/tests/**
            termux-terminal-view/build/reports/tests/**
